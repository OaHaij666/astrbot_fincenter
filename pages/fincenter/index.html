<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinCenter 配置</title>
  <style>
    :root { color-scheme: light dark; font-family: "Microsoft YaHei", system-ui, sans-serif; }
    body { margin: 0; background: #f7f9fc; color: #243244; }
    [data-theme="dark"] body { background: #111827; color: #e5e7eb; }
    main { max-width: 1080px; margin: 0 auto; padding: 20px; }
    h1 { font-size: 24px; margin: 0 0 16px; }
    h2 { font-size: 17px; margin: 0 0 12px; }
    section { background: rgba(255,255,255,.94); border: 1px solid #dbe4ef; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    [data-theme="dark"] section { background: #1f2937; border-color: #374151; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 8px 0; }
    label { font-size: 13px; color: #64748b; display: block; margin-bottom: 4px; }
    input, textarea, select { min-height: 34px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 8px; background: #fff; color: #111827; }
    [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select { background: #111827; color: #e5e7eb; border-color: #4b5563; }
    button { min-height: 34px; border: 0; border-radius: 6px; padding: 0 12px; background: #2563eb; color: white; cursor: pointer; }
    button.secondary { background: #64748b; }
    button.danger { background: #dc2626; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 8px; text-align: left; }
    [data-theme="dark"] th, [data-theme="dark"] td { border-color: #374151; }
    .muted { color: #64748b; font-size: 13px; }
    .status { margin-top: 8px; font-size: 13px; white-space: pre-wrap; }
    .grow { flex: 1 1 180px; }
  </style>
</head>
<body>
<main>
  <h1>FinCenter 配置</h1>
  <section>
    <h2>付费组绑定</h2>
    <p class="muted">一个群绑定一个付费组；多个群绑定同一组时共享同一套收费命令。</p>
    <div class="row">
      <div class="grow">
        <label>群号</label>
        <input id="physicalGroupId" placeholder="例如 123456789">
      </div>
      <div class="grow">
        <label>付费组 ID</label>
        <input id="paidGroupId" placeholder="例如 default">
      </div>
      <div>
        <label>启用</label>
        <select id="paidEnabled"><option value="true">启用</option><option value="false">禁用</option></select>
      </div>
      <button id="loadConfig">读取</button>
      <button id="saveBinding">保存绑定</button>
    </div>
    <div id="bindingStatus" class="status"></div>
  </section>

  <section>
    <h2>付费命令</h2>
    <div class="row">
      <div class="grow">
        <label>命令</label>
        <input id="commandName" placeholder="weather">
      </div>
      <div>
        <label>费用</label>
        <input id="commandCost" type="number" step="0.01" value="5">
      </div>
      <div class="grow">
        <label>描述</label>
        <input id="commandDesc" placeholder="查询天气">
      </div>
      <button id="saveCommand">保存命令</button>
    </div>
    <table>
      <thead><tr><th>组</th><th>命令</th><th>费用</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="commandRows"></tbody>
    </table>
  </section>

  <section>
    <h2>扫描其他插件命令</h2>
    <p class="muted">点击扫描后，可参考命令名添加到当前付费组。</p>
    <button id="scanCommands" class="secondary">扫描命令</button>
    <div id="scanResult" class="status"></div>
  </section>

  <section>
    <h2>全局配置</h2>
    <p class="muted">全局开关、扣费提示、管理员是否免费、股票/物资配置等，仍建议在 AstrBot 原生插件配置页编辑。这里负责运行时付费组配置。</p>
  </section>
</main>
<script src="/api/plugin/page/bridge-sdk.js"></script>
<script>
const $ = (id) => document.getElementById(id);
let commands = [];

function apiGet(path, params) { return window.AstrBotPluginPage.apiGet(path, params); }
function apiPost(path, body) { return window.AstrBotPluginPage.apiPost(path, body); }

function renderCommands() {
  $("commandRows").innerHTML = commands.map((row) => `
    <tr>
      <td>${row.group_id}</td>
      <td>${row.command}</td>
      <td>${Number(row.cost || 0).toFixed(2)}</td>
      <td>${row.description || ""}</td>
      <td>${row.enabled ? "启用" : "禁用"}</td>
      <td>
        <button class="secondary" onclick="toggleCommand('${row.command}', ${!row.enabled})">${row.enabled ? "禁用" : "启用"}</button>
        <button class="danger" onclick="removeCommand('${row.command}')">删除</button>
      </td>
    </tr>`).join("");
}

async function loadConfig() {
  const groupId = $("physicalGroupId").value.trim();
  if (!groupId) { $("bindingStatus").textContent = "请先输入群号"; return; }
  const data = await apiGet("paid/config", { group_id: groupId });
  $("paidGroupId").value = data.paid_group_id || groupId;
  $("paidEnabled").value = data.paid_enabled ? "true" : "false";
  commands = data.commands || [];
  renderCommands();
  $("bindingStatus").textContent = `已读取：群 ${groupId} -> 付费组 ${$("paidGroupId").value}`;
}

async function saveBinding() {
  const physical_group_id = $("physicalGroupId").value.trim();
  const paid_group_id = $("paidGroupId").value.trim() || physical_group_id;
  const enabled = $("paidEnabled").value === "true";
  await apiPost("paid/binding", { physical_group_id, paid_group_id, enabled });
  $("bindingStatus").textContent = "绑定已保存";
  await loadConfig();
}

async function saveCommand() {
  const paid_group_id = $("paidGroupId").value.trim();
  const command = $("commandName").value.trim();
  const cost = Number($("commandCost").value || 0);
  const description = $("commandDesc").value.trim();
  await apiPost("paid/command", { paid_group_id, command, cost, description });
  await loadConfig();
}

async function removeCommand(command) {
  await apiPost("paid/command/remove", { paid_group_id: $("paidGroupId").value.trim(), command });
  await loadConfig();
}

async function toggleCommand(command, enabled) {
  await apiPost("paid/command/toggle", { paid_group_id: $("paidGroupId").value.trim(), command, enabled });
  await loadConfig();
}

async function scanCommands() {
  const rows = await apiGet("paid/scan", {});
  $("scanResult").textContent = rows.slice(0, 80).map((r) => `[${r.plugin}] ${r.command}${r.desc ? " - " + r.desc : ""}`).join("\n") || "未发现命令";
}

window.toggleCommand = toggleCommand;
window.removeCommand = removeCommand;

window.AstrBotPluginPage.ready().then(() => {
  $("loadConfig").onclick = loadConfig;
  $("saveBinding").onclick = saveBinding;
  $("saveCommand").onclick = saveCommand;
  $("scanCommands").onclick = scanCommands;
});
</script>
</body>
</html>
