<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FinCenter 管理台</title>
  <style>
    :root { color-scheme: light dark; font-family: "Microsoft YaHei", system-ui, sans-serif; }
    * { box-sizing: border-box; }
    body { margin: 0; background: #f6f8fb; color: #263244; }
    [data-theme="dark"] body { background: #111827; color: #e5e7eb; }
    main { max-width: 1240px; margin: 0 auto; padding: 20px; }
    header { display: flex; justify-content: space-between; gap: 12px; align-items: center; margin-bottom: 14px; }
    h1 { font-size: 24px; margin: 0; }
    h2 { font-size: 17px; margin: 0 0 12px; }
    h3 { font-size: 14px; margin: 14px 0 8px; color: #475569; }
    .tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
    .tab { background: #e2e8f0; color: #1f2937; }
    .tab.active { background: #2563eb; color: white; }
    section { display: none; background: rgba(255,255,255,.96); border: 1px solid #dbe4ef; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    section.active { display: block; }
    [data-theme="dark"] section { background: #1f2937; border-color: #374151; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px; align-items: end; }
    .row { display: flex; gap: 10px; flex-wrap: wrap; align-items: end; margin: 10px 0; }
    label { font-size: 13px; color: #64748b; display: block; margin-bottom: 4px; }
    input, textarea, select { width: 100%; min-height: 34px; border: 1px solid #cbd5e1; border-radius: 6px; padding: 6px 8px; background: #fff; color: #111827; }
    textarea { min-height: 70px; resize: vertical; }
    [data-theme="dark"] input, [data-theme="dark"] textarea, [data-theme="dark"] select { background: #111827; color: #e5e7eb; border-color: #4b5563; }
    button { min-height: 34px; border: 0; border-radius: 6px; padding: 0 12px; background: #2563eb; color: white; cursor: pointer; white-space: nowrap; }
    button.secondary { background: #64748b; }
    button.danger { background: #dc2626; }
    button.ok { background: #059669; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 12px; }
    th, td { border-bottom: 1px solid #e2e8f0; padding: 8px; text-align: left; vertical-align: middle; }
    [data-theme="dark"] th, [data-theme="dark"] td { border-color: #374151; }
    .status { font-size: 13px; color: #2563eb; white-space: pre-wrap; }
    .muted { color: #64748b; font-size: 13px; }
    .pill { display: inline-flex; align-items: center; height: 24px; padding: 0 8px; border-radius: 999px; background: #e2e8f0; color: #334155; font-size: 12px; }
    .thumb { width: 44px; height: 44px; object-fit: cover; border-radius: 6px; border: 1px solid #cbd5e1; }
    .actions { display: flex; gap: 6px; flex-wrap: wrap; }
    .wide { grid-column: 1 / -1; }
  </style>
</head>
<body>
<main>
  <header>
    <h1>FinCenter 管理台</h1>
    <div id="topStatus" class="status"></div>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="groups">群绑定</button>
    <button class="tab" data-tab="goods">物资组</button>
    <button class="tab" data-tab="stock">股市组</button>
    <button class="tab" data-tab="paid">付费组</button>
    <button class="tab" data-tab="settings">基础设置</button>
  </nav>

  <section id="groups" class="active">
    <h2>群绑定与模块开关</h2>
    <div class="grid">
      <div>
        <label>群号</label>
        <input id="physicalGroupId" placeholder="123456789">
      </div>
      <button id="loadOverview">读取群配置</button>
    </div>
    <h3>全局模块</h3>
    <div class="row">
      <button id="enableStock" class="ok">启用股市模块</button>
      <button id="disableStock" class="danger">禁用股市模块</button>
      <button id="enableGoods" class="ok">启用物资模块</button>
      <button id="disableGoods" class="danger">禁用物资模块</button>
      <button id="enablePaid" class="ok">启用付费拦截</button>
      <button id="disablePaid" class="danger">禁用付费拦截</button>
    </div>
    <h3>本群绑定</h3>
    <table>
      <thead><tr><th>模块</th><th>启用</th><th>绑定组</th><th>操作</th></tr></thead>
      <tbody>
        <tr>
          <td>股市</td>
          <td><select id="stockBindEnabled"><option value="true">启用</option><option value="false">禁用</option></select></td>
          <td><input id="stockBindGroup" placeholder="stock group"></td>
          <td><button data-save-binding="stock">保存</button></td>
        </tr>
        <tr>
          <td>物资</td>
          <td><select id="goodsBindEnabled"><option value="true">启用</option><option value="false">禁用</option></select></td>
          <td><input id="goodsBindGroup" placeholder="goods group"></td>
          <td><button data-save-binding="goods">保存</button></td>
        </tr>
        <tr>
          <td>付费</td>
          <td><select id="paidBindEnabled"><option value="true">启用</option><option value="false">禁用</option></select></td>
          <td><input id="paidBindGroup" placeholder="paid group"></td>
          <td><button data-save-binding="paid">保存</button></td>
        </tr>
      </tbody>
    </table>
  </section>

  <section id="goods">
    <h2>物资组</h2>
    <div class="grid">
      <div><label>物资组 ID</label><input id="goodsGroupId" placeholder="default"></div>
      <button id="loadGoods">读取物资组</button>
      <button id="resetGoods" class="secondary">重置价格</button>
    </div>
    <h3>商品</h3>
    <div class="grid">
      <div><label>物资 ID</label><input id="goodsId"></div>
      <div><label>名称</label><input id="goodsName"></div>
      <div><label>图标</label><input id="goodsIcon" value="📦"></div>
      <div><label>基准价</label><input id="goodsBasePrice" type="number" step="0.01" value="10"></div>
      <div><label>当前价</label><input id="goodsCurrentPrice" type="number" step="0.01" value="10"></div>
      <div><label>最低价</label><input id="goodsMinPrice" type="number" step="0.01" value="1"></div>
      <div><label>最高价</label><input id="goodsMaxPrice" type="number" step="0.01" value="100"></div>
      <div><label>波动率</label><input id="goodsVolatility" type="number" step="0.01" value="0.1"></div>
      <div class="wide"><label>图片</label><input id="goodsImage" type="file" accept="image/*"></div>
      <button id="saveGoods" class="ok">保存商品</button>
      <button id="clearGoodsForm" class="secondary">清空</button>
    </div>
    <table>
      <thead><tr><th>图片</th><th>ID</th><th>名称</th><th>价格</th><th>范围</th><th>波动</th><th>操作</th></tr></thead>
      <tbody id="goodsRows"></tbody>
    </table>
  </section>

  <section id="stock">
    <h2>股市组</h2>
    <div class="grid">
      <div><label>股市组 ID</label><input id="stockGroupId" placeholder="default"></div>
      <button id="loadStock">读取股市组</button>
      <button id="stockOpen" class="ok">开市</button>
      <button id="stockClose" class="danger">休市</button>
      <button id="stockAuto" class="secondary">自动</button>
    </div>
    <h3>股票</h3>
    <div class="grid">
      <div><label>代码</label><input id="stockCode" placeholder="ABC"></div>
      <div><label>名称</label><input id="stockName"></div>
      <div><label>图标</label><input id="stockIcon"></div>
      <div><label>当前价</label><input id="stockPrice" type="number" step="0.01" value="100"></div>
      <div><label>趋势级别</label><input id="stockTrend" type="number" min="-3" max="3" step="1" value="0"></div>
      <div class="wide"><label>描述</label><textarea id="stockDescription"></textarea></div>
      <button id="saveStock" class="ok">保存股票</button>
      <button id="clearStockForm" class="secondary">清空</button>
    </div>
    <table>
      <thead><tr><th>代码</th><th>名称</th><th>价格</th><th>趋势</th><th>描述</th><th>操作</th></tr></thead>
      <tbody id="stockRows"></tbody>
    </table>
  </section>

  <section id="paid">
    <h2>付费组</h2>
    <div class="grid">
      <div><label>付费组 ID</label><input id="paidGroupId" placeholder="default"></div>
      <button id="loadPaid">读取付费组</button>
      <button id="scanCommands" class="secondary">扫描其他插件命令</button>
    </div>
    <h3>付费命令</h3>
    <div class="grid">
      <div><label>命令</label><input id="commandName" placeholder="weather"></div>
      <div><label>费用</label><input id="commandCost" type="number" step="0.01" value="5"></div>
      <div><label>状态</label><select id="commandEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      <div class="wide"><label>描述</label><input id="commandDesc" placeholder="查询天气"></div>
      <button id="saveCommand" class="ok">保存命令</button>
    </div>
    <table>
      <thead><tr><th>组</th><th>命令</th><th>费用</th><th>描述</th><th>状态</th><th>操作</th></tr></thead>
      <tbody id="commandRows"></tbody>
    </table>
    <h3>扫描结果</h3>
    <div id="scanResult" class="muted"></div>
  </section>

  <section id="settings">
    <h2>基础设置</h2>
    <div class="grid">
      <div class="wide"><label>管理员 ID</label><input id="adminIds" placeholder="多个 ID 用逗号/空格/换行分隔"></div>
      <div><label>跨群金钱数据</label><select id="crossGroupData"><option value="false">关闭</option><option value="true">开启</option></select></div>
      <div><label>货币名称</label><input id="currencyName"></div>
      <div><label>货币图标</label><input id="currencyIcon"></div>
      <div><label>初始余额</label><input id="initialBalance" type="number" step="0.01"></div>
      <div><label>开户费用</label><input id="openAccountCost" type="number" step="0.01"></div>
      <div><label>签到启用</label><select id="signinEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      <div><label>签到基础奖励</label><input id="signinRewardBase" type="number" step="0.01"></div>
      <div><label>签到随机奖励</label><input id="signinRewardVar" type="number" step="0.01"></div>
      <div><label>发言奖励启用</label><select id="chatRewardEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      <div><label>发言奖励</label><input id="chatRewardAmount" type="number" step="0.01"></div>
      <div><label>发言冷却秒</label><input id="chatRewardCooldown" type="number" step="1"></div>
      <div><label>股市更新秒</label><input id="stockUpdateInterval" type="number" step="1"></div>
      <div><label>股票手续费率</label><input id="stockFeeRate" type="number" step="0.0001"></div>
      <div><label>股市波动率</label><input id="stockVolatility" type="number" step="0.001"></div>
      <div><label>交易时间限制</label><select id="stockTradingHours"><option value="false">关闭</option><option value="true">开启</option></select></div>
      <div><label>K线数量</label><input id="stockKlineCandles" type="number" step="1"></div>
      <div><label>新闻启用</label><select id="stockNewsEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      <div><label>新闻触发概率</label><input id="stockNewsProb" type="number" step="0.01"></div>
      <div><label>物资刷新秒</label><input id="goodsRefreshInterval" type="number" step="1"></div>
      <div><label>物资默认波动</label><input id="goodsPriceVolatility" type="number" step="0.01"></div>
      <div><label>用户交易</label><select id="goodsUserTradeEnabled"><option value="true">启用</option><option value="false">禁用</option></select></div>
      <div><label>用户交易税率</label><input id="goodsUserTradeTax" type="number" step="0.01"></div>
      <div><label>付费默认费用</label><input id="paidDefaultCost" type="number" step="0.01"></div>
      <div><label>管理员免费</label><select id="paidIgnoreAdmin"><option value="true">是</option><option value="false">否</option></select></div>
      <div><label>付费命令前缀</label><input id="paidPrefixes" placeholder="/, !"></div>
      <div><label>渲染策略</label><select id="renderStrategy"><option value="local">local</option><option value="remote">remote</option></select></div>
      <div class="wide"><label>余额不足提示</label><textarea id="paidInsufficientMsg"></textarea></div>
      <div class="wide"><label>扣费提示</label><textarea id="paidDeductMsg"></textarea></div>
      <button id="loadSettings">读取设置</button>
      <button id="saveSettings" class="ok">保存设置</button>
    </div>
  </section>
</main>

<script src="/api/plugin/page/bridge-sdk.js"></script>
<script>
const $ = (id) => document.getElementById(id);
const esc = (v) => String(v ?? "").replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
let goodsItems = [];
let stockCompanies = [];
let paidCommands = [];

function unwrap(res) {
  if (res && typeof res === "object" && "status" in res && "data" in res) {
    if (res.status !== "ok") throw new Error(res.message || "请求失败");
    return res.data;
  }
  return res;
}
async function apiGet(path, params = {}) { return unwrap(await window.AstrBotPluginPage.apiGet(path, params)); }
async function apiPost(path, body = {}) { return unwrap(await window.AstrBotPluginPage.apiPost(path, body)); }
function setStatus(text) { $("topStatus").textContent = text || ""; }
function boolVal(id) { return $(id).value === "true"; }
function numVal(id) { return Number($(id).value || 0); }

function switchTab(name) {
  document.querySelectorAll(".tab").forEach((b) => b.classList.toggle("active", b.dataset.tab === name));
  document.querySelectorAll("section").forEach((s) => s.classList.toggle("active", s.id === name));
}

async function loadOverview() {
  const groupId = $("physicalGroupId").value.trim();
  const data = await apiGet("admin/overview", { group_id: groupId });
  for (const module of ["stock", "goods", "paid"]) {
    const b = data.bindings?.[module] || { enabled: true, group_id: groupId };
    $(`${module}BindEnabled`).value = b.enabled ? "true" : "false";
    $(`${module}BindGroup`).value = b.group_id || groupId;
  }
  $("goodsGroupId").value = $("goodsBindGroup").value;
  $("stockGroupId").value = $("stockBindGroup").value;
  $("paidGroupId").value = $("paidBindGroup").value;
  setStatus(`股市 ${data.modules.stock ? "启用" : "禁用"} / 物资 ${data.modules.goods ? "启用" : "禁用"} / 付费 ${data.modules.paid ? "启用" : "禁用"}`);
}

async function saveBinding(module) {
  const physical_group_id = $("physicalGroupId").value.trim();
  if (!physical_group_id) throw new Error("请填写群号");
  const market_group_id = $(`${module}BindGroup`).value.trim() || physical_group_id;
  const enabled = $(`${module}BindEnabled`).value === "true";
  await apiPost("admin/binding", { module, physical_group_id, market_group_id, enabled });
  if (module === "goods") $("goodsGroupId").value = market_group_id;
  if (module === "stock") $("stockGroupId").value = market_group_id;
  if (module === "paid") $("paidGroupId").value = market_group_id;
  setStatus("绑定已保存");
}

async function setModule(module, enabled) {
  const data = await apiPost("admin/module", { module, enabled });
  setStatus(data.message || "模块状态已更新");
  await loadOverview();
}

function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    if (!file) return resolve("");
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function loadGoods() {
  const goods_group_id = $("goodsGroupId").value.trim();
  const data = await apiGet("admin/goods/config", { goods_group_id });
  $("goodsGroupId").value = data.goods_group_id || goods_group_id;
  goodsItems = data.items || [];
  renderGoods();
  setStatus(`已读取物资组 ${$("goodsGroupId").value}`);
}

function renderGoods() {
  $("goodsRows").innerHTML = goodsItems.map((g) => `
    <tr>
      <td>${g.preview_image ? `<img class="thumb" src="${esc(g.preview_image.startsWith("file:///") ? g.preview_image : "file:///" + g.preview_image.replaceAll("\\", "/"))}">` : `<span class="pill">${esc(g.icon || "物资")}</span>`}</td>
      <td>${esc(g.goods_id)}</td>
      <td>${esc(g.name)}</td>
      <td>${Number(g.current_price || 0).toFixed(2)} / ${Number(g.base_price || 0).toFixed(2)}</td>
      <td>${Number(g.min_price || 0).toFixed(2)} - ${Number(g.max_price || 0).toFixed(2)}</td>
      <td>${Number(g.volatility || 0).toFixed(3)}</td>
      <td class="actions">
        <button class="secondary" data-edit-goods="${esc(g.goods_id)}">编辑</button>
        <button class="danger" data-remove-goods="${esc(g.goods_id)}">删除</button>
      </td>
    </tr>`).join("");
  document.querySelectorAll("[data-edit-goods]").forEach((b) => b.onclick = () => editGoods(b.dataset.editGoods));
  document.querySelectorAll("[data-remove-goods]").forEach((b) => b.onclick = () => removeGoods(b.dataset.removeGoods));
}

function clearGoodsForm() {
  $("goodsId").value = "";
  $("goodsName").value = "";
  $("goodsIcon").value = "📦";
  $("goodsBasePrice").value = 10;
  $("goodsCurrentPrice").value = 10;
  $("goodsMinPrice").value = 1;
  $("goodsMaxPrice").value = 100;
  $("goodsVolatility").value = 0.1;
  $("goodsImage").value = "";
}

function editGoods(id) {
  const g = goodsItems.find((x) => x.goods_id === id);
  if (!g) return;
  $("goodsId").value = g.goods_id;
  $("goodsName").value = g.name;
  $("goodsIcon").value = g.icon || "📦";
  $("goodsBasePrice").value = g.base_price;
  $("goodsCurrentPrice").value = g.current_price;
  $("goodsMinPrice").value = g.min_price;
  $("goodsMaxPrice").value = g.max_price;
  $("goodsVolatility").value = g.volatility;
}

async function saveGoods() {
  const file = $("goodsImage").files[0];
  await apiPost("admin/goods/item", {
    goods_group_id: $("goodsGroupId").value.trim(),
    goods_id: $("goodsId").value.trim(),
    name: $("goodsName").value.trim(),
    icon: $("goodsIcon").value.trim() || "📦",
    base_price: numVal("goodsBasePrice"),
    current_price: numVal("goodsCurrentPrice"),
    min_price: numVal("goodsMinPrice"),
    max_price: numVal("goodsMaxPrice"),
    volatility: numVal("goodsVolatility"),
    image_name: file?.name || "",
    image_data: await fileToDataUrl(file),
  });
  await loadGoods();
  setStatus("商品已保存");
}

async function removeGoods(goods_id) {
  await apiPost("admin/goods/item/remove", { goods_group_id: $("goodsGroupId").value.trim(), goods_id });
  await loadGoods();
}

async function resetGoods() {
  await apiPost("admin/goods/reset", { goods_group_id: $("goodsGroupId").value.trim() });
  await loadGoods();
}

async function loadStock() {
  const stock_group_id = $("stockGroupId").value.trim();
  const data = await apiGet("admin/stock/config", { stock_group_id });
  $("stockGroupId").value = data.stock_group_id || stock_group_id;
  stockCompanies = data.companies || [];
  renderStock();
  setStatus(`已读取股市组 ${$("stockGroupId").value}`);
}

function renderStock() {
  $("stockRows").innerHTML = stockCompanies.map((s) => `
    <tr>
      <td>${esc(s.code)}</td>
      <td>${esc(s.icon || "")} ${esc(s.name)}</td>
      <td>${Number(s.current_price || 0).toFixed(2)}</td>
      <td>${Number(s.trend_level || 0)}</td>
      <td>${esc(s.description || "")}</td>
      <td class="actions">
        <button class="secondary" data-edit-stock="${esc(s.code)}">编辑</button>
        <button class="danger" data-remove-stock="${esc(s.code)}">删除</button>
      </td>
    </tr>`).join("");
  document.querySelectorAll("[data-edit-stock]").forEach((b) => b.onclick = () => editStock(b.dataset.editStock));
  document.querySelectorAll("[data-remove-stock]").forEach((b) => b.onclick = () => removeStock(b.dataset.removeStock));
}

function clearStockForm() {
  $("stockCode").value = "";
  $("stockName").value = "";
  $("stockIcon").value = "";
  $("stockPrice").value = 100;
  $("stockTrend").value = 0;
  $("stockDescription").value = "";
}

function editStock(code) {
  const s = stockCompanies.find((x) => x.code === code);
  if (!s) return;
  $("stockCode").value = s.code;
  $("stockName").value = s.name;
  $("stockIcon").value = s.icon || "";
  $("stockPrice").value = s.current_price;
  $("stockTrend").value = s.trend_level;
  $("stockDescription").value = s.description || "";
}

async function saveStock() {
  await apiPost("admin/stock/company", {
    stock_group_id: $("stockGroupId").value.trim(),
    code: $("stockCode").value.trim(),
    name: $("stockName").value.trim(),
    icon: $("stockIcon").value.trim(),
    current_price: numVal("stockPrice"),
    trend_level: Number($("stockTrend").value || 0),
    description: $("stockDescription").value,
  });
  await loadStock();
  setStatus("股票已保存");
}

async function removeStock(code) {
  await apiPost("admin/stock/company/remove", { stock_group_id: $("stockGroupId").value.trim(), code });
  await loadStock();
}

async function setStockMode(mode) {
  await apiPost("admin/stock/open-state", { mode });
  setStatus("股市状态已更新");
}

async function loadPaid() {
  const paid_group_id = $("paidGroupId").value.trim();
  const data = await apiGet("admin/paid/config", { paid_group_id });
  $("paidGroupId").value = data.paid_group_id || paid_group_id;
  paidCommands = data.commands || [];
  renderPaid();
  setStatus(`已读取付费组 ${$("paidGroupId").value}`);
}

function renderPaid() {
  $("commandRows").innerHTML = paidCommands.map((row) => `
    <tr>
      <td>${esc(row.group_id)}</td>
      <td>${esc(row.command)}</td>
      <td>${Number(row.cost || 0).toFixed(2)}</td>
      <td>${esc(row.description || "")}</td>
      <td>${row.enabled ? "启用" : "禁用"}</td>
      <td class="actions">
        <button class="secondary" data-toggle-command="${esc(row.command)}" data-enabled="${row.enabled ? "false" : "true"}">${row.enabled ? "禁用" : "启用"}</button>
        <button class="danger" data-remove-command="${esc(row.command)}">删除</button>
      </td>
    </tr>`).join("");
  document.querySelectorAll("[data-toggle-command]").forEach((b) => b.onclick = () => toggleCommand(b.dataset.toggleCommand, b.dataset.enabled === "true"));
  document.querySelectorAll("[data-remove-command]").forEach((b) => b.onclick = () => removeCommand(b.dataset.removeCommand));
}

async function saveCommand() {
  await apiPost("admin/paid/command", {
    paid_group_id: $("paidGroupId").value.trim(),
    command: $("commandName").value.trim(),
    cost: numVal("commandCost"),
    enabled: boolVal("commandEnabled"),
    description: $("commandDesc").value.trim(),
  });
  await loadPaid();
}

async function removeCommand(command) {
  await apiPost("admin/paid/command/remove", { paid_group_id: $("paidGroupId").value.trim(), command });
  await loadPaid();
}

async function toggleCommand(command, enabled) {
  await apiPost("admin/paid/command/toggle", { paid_group_id: $("paidGroupId").value.trim(), command, enabled });
  await loadPaid();
}

async function scanCommands() {
  const rows = await apiGet("admin/paid/scan", {});
  $("scanResult").textContent = (rows || []).slice(0, 120).map((r) => `[${r.plugin}] ${r.command}${r.desc ? " - " + r.desc : ""}`).join("\n") || "未发现命令";
}

async function loadSettings() {
  const data = await apiGet("admin/settings", {});
  $("adminIds").value = (data.basic?.admin_ids || []).join("\n");
  $("crossGroupData").value = data.basic?.cross_group_data ? "true" : "false";
  $("currencyName").value = data.currency?.currency_name || "";
  $("currencyIcon").value = data.currency?.currency_icon || "";
  $("initialBalance").value = data.currency?.initial_balance ?? 0;
  $("openAccountCost").value = data.currency?.open_account_cost ?? 0;
  $("signinEnabled").value = data.signin?.signin_enabled ? "true" : "false";
  $("signinRewardBase").value = data.signin?.signin_reward_base ?? 0;
  $("signinRewardVar").value = data.signin?.signin_reward_var ?? 0;
  $("chatRewardEnabled").value = data.chat_reward?.chat_reward_enabled ? "true" : "false";
  $("chatRewardAmount").value = data.chat_reward?.chat_reward_amount ?? 0;
  $("chatRewardCooldown").value = data.chat_reward?.chat_reward_cooldown ?? 0;
  $("stockUpdateInterval").value = data.stock?.stock_update_interval ?? 300;
  $("stockFeeRate").value = data.stock?.stock_fee_rate ?? 0.001;
  $("stockVolatility").value = data.stock?.stock_volatility ?? 0.02;
  $("stockTradingHours").value = data.stock?.stock_trading_hours ? "true" : "false";
  $("stockKlineCandles").value = data.stock?.stock_kline_candles ?? 50;
  $("stockNewsEnabled").value = data.stock_news?.stock_news_enabled ? "true" : "false";
  $("stockNewsProb").value = data.stock_news?.stock_news_trigger_prob ?? 0.3;
  $("goodsRefreshInterval").value = data.goods?.goods_refresh_interval ?? 86400;
  $("goodsPriceVolatility").value = data.goods?.goods_price_volatility ?? 0.1;
  $("goodsUserTradeEnabled").value = data.goods?.goods_user_trade_enabled ? "true" : "false";
  $("goodsUserTradeTax").value = data.goods?.goods_user_trade_tax ?? 0.05;
  $("paidDefaultCost").value = data.paid_cmd?.paid_cmd_default_cost ?? 50;
  $("paidIgnoreAdmin").value = data.paid_cmd?.paid_cmd_ignore_admin ? "true" : "false";
  $("paidPrefixes").value = (data.paid_cmd?.paid_cmd_prefixes || []).join(", ");
  $("paidInsufficientMsg").value = data.paid_cmd?.paid_cmd_insufficient_msg || "";
  $("paidDeductMsg").value = data.paid_cmd?.paid_cmd_deduct_msg || "";
  $("renderStrategy").value = data.rendering?.render_strategy || "local";
  setStatus("设置已读取");
}

async function saveSettings() {
  await apiPost("admin/settings", {
    basic: {
      admin_ids: $("adminIds").value,
      cross_group_data: boolVal("crossGroupData"),
    },
    currency: {
      currency_name: $("currencyName").value,
      currency_icon: $("currencyIcon").value,
      initial_balance: numVal("initialBalance"),
      open_account_cost: numVal("openAccountCost"),
    },
    signin: {
      signin_enabled: boolVal("signinEnabled"),
      signin_reward_base: numVal("signinRewardBase"),
      signin_reward_var: numVal("signinRewardVar"),
    },
    chat_reward: {
      chat_reward_enabled: boolVal("chatRewardEnabled"),
      chat_reward_amount: numVal("chatRewardAmount"),
      chat_reward_cooldown: Number($("chatRewardCooldown").value || 0),
    },
    stock: {
      stock_update_interval: Number($("stockUpdateInterval").value || 300),
      stock_fee_rate: numVal("stockFeeRate"),
      stock_volatility: numVal("stockVolatility"),
      stock_trading_hours: boolVal("stockTradingHours"),
      stock_kline_candles: Number($("stockKlineCandles").value || 50),
    },
    stock_news: {
      stock_news_enabled: boolVal("stockNewsEnabled"),
      stock_news_trigger_prob: numVal("stockNewsProb"),
    },
    goods: {
      goods_refresh_interval: Number($("goodsRefreshInterval").value || 86400),
      goods_price_volatility: numVal("goodsPriceVolatility"),
      goods_user_trade_enabled: boolVal("goodsUserTradeEnabled"),
      goods_user_trade_tax: numVal("goodsUserTradeTax"),
    },
    paid_cmd: {
      paid_cmd_default_cost: numVal("paidDefaultCost"),
      paid_cmd_ignore_admin: boolVal("paidIgnoreAdmin"),
      paid_cmd_prefixes: $("paidPrefixes").value,
      paid_cmd_insufficient_msg: $("paidInsufficientMsg").value,
      paid_cmd_deduct_msg: $("paidDeductMsg").value,
    },
    rendering: {
      render_strategy: $("renderStrategy").value,
    },
  });
  setStatus("设置已保存到当前插件实例");
}

function bind(id, fn) { $(id).onclick = () => Promise.resolve(fn()).catch((e) => setStatus(e.message || String(e))); }

window.AstrBotPluginPage.ready().then(() => {
  document.querySelectorAll(".tab").forEach((b) => b.onclick = () => switchTab(b.dataset.tab));
  bind("loadOverview", loadOverview);
  document.querySelectorAll("[data-save-binding]").forEach((b) => b.onclick = () => saveBinding(b.dataset.saveBinding).catch((e) => setStatus(e.message || String(e))));
  bind("enableStock", () => setModule("stock", true));
  bind("disableStock", () => setModule("stock", false));
  bind("enableGoods", () => setModule("goods", true));
  bind("disableGoods", () => setModule("goods", false));
  bind("enablePaid", () => setModule("paid", true));
  bind("disablePaid", () => setModule("paid", false));
  bind("loadGoods", loadGoods);
  bind("saveGoods", saveGoods);
  bind("resetGoods", resetGoods);
  $("clearGoodsForm").onclick = clearGoodsForm;
  bind("loadStock", loadStock);
  bind("saveStock", saveStock);
  $("clearStockForm").onclick = clearStockForm;
  bind("stockOpen", () => setStockMode("open"));
  bind("stockClose", () => setStockMode("close"));
  bind("stockAuto", () => setStockMode("auto"));
  bind("loadPaid", loadPaid);
  bind("saveCommand", saveCommand);
  bind("scanCommands", scanCommands);
  bind("loadSettings", loadSettings);
  bind("saveSettings", saveSettings);
  loadSettings().catch(() => {});
});
</script>
</body>
</html>
