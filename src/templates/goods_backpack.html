<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: fit-content;
    min-width: 350px;
    max-width: 600px;
    font-family: 'Source Han Sans SC', 'Microsoft YaHei', 'SimHei', sans-serif;
    background: linear-gradient(180deg, #eef3ff 0%, #fafcff 100%);
    padding: 16px;
    color: #4a5b6e;
  }
  .title-bar {
    background: rgba(215, 232, 248, 0.75);
    border-radius: 14px;
    padding: 12px 20px;
    text-align: center;
    margin-bottom: 14px;
  }
  .title-bar h1 {
    font-size: 22px;
    color: #4a7fa8;
    font-weight: 700;
  }
  .card {
    background: rgba(255,255,255,0.95);
    border: 2px solid rgba(170,210,240,0.7);
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(190,210,235,0.15);
    padding: 12px 18px;
    margin-bottom: 8px;
  }
  .item-row {
    display: flex;
    justify-content: space-between;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid rgba(200,220,240,0.4);
  }
  .item-row:last-child { border-bottom: none; }
  .item-name { color: #4a5b6e; font-weight: 700; font-size: 15px; }
  .item-detail { color: #7a8fa5; text-align: right; }
  .summary {
    text-align: center;
    font-size: 16px;
    padding: 8px 0;
  }
  .summary-value { font-weight: 700; font-size: 20px; color: #4a7fa8; }
</style>
</head>
<body>
  <div class="title-bar">
    <h1>🎒 {{ user_name }} 的物资背包</h1>
  </div>

  {% for b in backpack %}
  <div class="card">
    <div class="item-row">
      <span class="item-name">{{ b.icon }} {{ b.name }}</span>
      <span class="item-detail">{{ "%.2f"|format(b.amount) }}</span>
    </div>
    <div class="item-row">
      <span>单价 {{ "%.2f"|format(b.current_price) }}</span>
      <span>市值 {{ "%.2f"|format(b.total_value) }}</span>
    </div>
  </div>
  {% endfor %}

  <div class="card">
    <div class="summary">
      总市值 <span class="summary-value">{{ currency_icon }}{{ "%.2f"|format(total_value) }}</span>
    </div>
  </div>
</body>
</html>
